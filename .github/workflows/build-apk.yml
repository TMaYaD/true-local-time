name: Build & Publish APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate Android platform files
        run: flutter create --platforms=android .

      - name: Configure Android manifest and package
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          sed -i 's#<application#<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>\n    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>\n    <application#' "$MANIFEST"
          sed -i 's#android:label="true_local_time"#android:label="True Local Time"#' "$MANIFEST"

          # applicationId is the on-device id; namespace must be a valid Kotlin
          # package, so it drops the dot ("loonyb.in" -> "loonybin").
          GRADLE=$(ls android/app/build.gradle.kts android/app/build.gradle 2>/dev/null | head -1)
          sed -i -E 's#applicationId( =)? *"[^"]*"#applicationId\1 "loonyb.in.true_local_time"#' "$GRADLE"
          sed -i -E 's#namespace( =)? *"[^"]*"#namespace\1 "loonybin.true_local_time"#' "$GRADLE"

          # Relocate MainActivity to match the new namespace.
          ACT=$(find android/app/src/main -name 'MainActivity.*' | head -1)
          LANG_ROOT=$(echo "$ACT" | sed -E 's#(android/app/src/main/(kotlin|java))/.*#\1#')
          NEW_DIR="$LANG_ROOT/loonybin/true_local_time"
          mkdir -p "$NEW_DIR"
          sed -i -E 's#^package .*#package loonybin.true_local_time#' "$ACT"
          mv "$ACT" "$NEW_DIR/$(basename "$ACT")"

      - name: Install home-screen widget
        # Drops the widget's Kotlin / res files into the freshly generated
        # Android project and registers the receiver inside <application>.
        run: |
          KOTLIN_ROOT=android/app/src/main/kotlin
          RES_ROOT=android/app/src/main/res
          mkdir -p "$KOTLIN_ROOT" "$RES_ROOT"
          cp -r android_widget/kotlin/. "$KOTLIN_ROOT/"
          cp -r android_widget/res/. "$RES_ROOT/"

          MANIFEST=android/app/src/main/AndroidManifest.xml
          awk '
          /<\/application>/ && !done {
            while ((getline line < "android_widget/manifest_receiver.xml") > 0) print line
            close("android_widget/manifest_receiver.xml")
            done = 1
          }
          { print }
          ' "$MANIFEST" > "$MANIFEST.tmp" && mv "$MANIFEST.tmp" "$MANIFEST"

      - name: Inject release signing config
        # Adds a release signingConfig sourced from env vars and points release
        # builds at it when ANDROID_KEYSTORE_PATH is set (falls back to debug
        # signing otherwise, which keeps the build working before the keystore
        # secret is configured). Stable signing is what lets users upgrade an
        # installed APK in place instead of hitting "package conflicts with an
        # existing package".
        run: |
          GRADLE=android/app/build.gradle.kts
          awk '
          /^    buildTypes \{/ && !done {
            print "    signingConfigs {"
            print "        create(\"release\") {"
            print "            val keystorePath = System.getenv(\"ANDROID_KEYSTORE_PATH\")"
            print "            if (keystorePath != null) {"
            print "                storeFile = file(keystorePath)"
            print "                storePassword = System.getenv(\"ANDROID_KEYSTORE_PASSWORD\")"
            print "                keyAlias = System.getenv(\"ANDROID_KEY_ALIAS\")"
            print "                keyPassword = System.getenv(\"ANDROID_KEY_PASSWORD\")"
            print "            }"
            print "        }"
            print "    }"
            print ""
            done = 1
          }
          { print }
          ' "$GRADLE" > "$GRADLE.tmp" && mv "$GRADLE.tmp" "$GRADLE"

          sed -i 's#signingConfig = signingConfigs.getByName("debug")#signingConfig = if (System.getenv("ANDROID_KEYSTORE_PATH") != null) signingConfigs.getByName("release") else signingConfigs.getByName("debug")#' "$GRADLE"

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
            echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"
            echo "Release keystore staged at $RUNNER_TEMP/release.keystore"
          else
            echo "ANDROID_KEYSTORE_BASE64 not set; release APK will be signed with the ephemeral debug key (installs will conflict across runs)."
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build release App Bundle
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build appbundle --release \
            --build-number=${{ github.run_number }} \
            --build-name=1.0.${{ github.run_number }} \
            --obfuscate --split-debug-info=build/symbols

      - name: Build release APKs (split per ABI)
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          flutter build apk --release --split-per-abi \
            --build-number=${{ github.run_number }} \
            --build-name=1.0.${{ github.run_number }} \
            --obfuscate --split-debug-info=build/symbols

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: true-local-time-apks
          path: build/app/outputs/flutter-apk/app-*-release.apk

      - name: Upload obfuscation symbols
        uses: actions/upload-artifact@v4
        with:
          name: symbols-build-${{ github.run_number }}
          path: build/symbols

      - name: Publish release binaries to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: |
            Sideload the APK that matches your device CPU. **`app-arm64-v8a-release.apk`** is the right pick for virtually every modern Android phone. The `.aab` is for Play Store uploads only and cannot be installed directly.
          files: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
